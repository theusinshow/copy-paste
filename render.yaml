services:
  - name: copy-paste-backend
    type: web
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: APP_NAME
        value: Copy&Paste Backend
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: copy-paste-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/copy-paste-uploads
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEX
        sync: false

databases:
  - name: copy-paste-db
    databaseName: copy_paste
    plan: free
